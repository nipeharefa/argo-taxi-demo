apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: database
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'valkey'
        static_configs:
          - targets: ['valkey-metrics.database.svc.cluster.local:9121']

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
